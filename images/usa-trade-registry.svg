<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="safeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#166534;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="420" fill="url(#bgGrad)" rx="20"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="60" y1="0" x2="60" y2="420"/>
    <line x1="120" y1="0" x2="120" y2="420"/>
    <line x1="180" y1="0" x2="180" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="360" y1="0" x2="360" y2="420"/>
    <line x1="420" y1="0" x2="420" y2="420"/>
    <line x1="480" y1="0" x2="480" y2="420"/>
    <line x1="540" y1="0" x2="540" y2="420"/>
  </g>

  <!-- Title -->
  <text x="300" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#93c5fd" letter-spacing="2">CORPORATE NETWORK MAPPING</text>
  <line x1="100" y1="42" x2="500" y2="42" stroke="#1d4ed8" stroke-width="0.8" opacity="0.6"/>

  <!-- ===== CENTER NODE: Parent Shell Co ===== -->
  <g filter="url(#shadow)">
    <rect x="218" y="110" width="164" height="64" rx="10" fill="url(#dangerGrad)" stroke="#ef4444" stroke-width="1.5"/>
  </g>
  <text x="300" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fca5a5" letter-spacing="1">⚠ SHELL ENTITY</text>
  <text x="300" y="151" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">GlobalTrade Co. LLC</text>
  <text x="300" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fca5a5">Est. 2021 · Liability Absorber</text>

  <!-- ===== LEFT NODE: Sister Entity 1 ===== -->
  <g filter="url(#shadow)">
    <rect x="38" y="108" width="140" height="68" rx="10" fill="url(#dangerGrad)" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  </g>
  <text x="108" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fdba74" letter-spacing="1">SISTER ENTITY</text>
  <text x="108" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">GlobalTrade A.Ş.</text>
  <text x="108" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fdba74">Near-Identical Name</text>
  <text x="108" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fdba74">Est. 2022 · Phoenix Risk</text>

  <!-- ===== RIGHT NODE: Sister Entity 2 ===== -->
  <g filter="url(#shadow)">
    <rect x="422" y="108" width="140" height="68" rx="10" fill="url(#dangerGrad)" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  </g>
  <text x="492" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fdba74" letter-spacing="1">SISTER ENTITY</text>
  <text x="492" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">GT Trading Ltd.</text>
  <text x="492" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fdba74">Shared Ownership</text>
  <text x="492" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fdba74">Est. 2023 · Asset Shield</text>

  <!-- Connection lines: Shell to Sister 1 -->
  <line x1="218" y1="142" x2="178" y2="142" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <!-- Connection lines: Shell to Sister 2 -->
  <line x1="382" y1="142" x2="422" y2="142" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>

  <!-- ===== BOTTOM LEFT: Dissolved Entity ===== -->
  <g filter="url(#shadow)">
    <rect x="48" y="250" width="140" height="60" rx="10" fill="#1e293b" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  </g>
  <text x="118" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9ca3af" letter-spacing="1">DISSOLVED</text>
  <text x="118" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6b7280">OldTrade LLC</text>
  <text x="118" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Bankruptcy Filed</text>
  <!-- Arrow from Sister 1 to dissolved -->
  <line x1="108" y1="176" x2="108" y2="250" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-blue)" opacity="0.6"/>

  <!-- ===== BOTTOM CENTER: Trade Registry ===== -->
  <g filter="url(#shadow)">
    <rect x="218" y="250" width="164" height="60" rx="10" fill="url(#safeGrad)" stroke="#22c55e" stroke-width="1.5"/>
  </g>
  <text x="300" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#86efac" letter-spacing="1">✓ VERIFIED</text>
  <text x="300" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">MERSİS Registry</text>
  <text x="300" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#86efac">Official Trade Record Check</text>
  <!-- Arrow from Shell to Registry -->
  <line x1="300" y1="174" x2="300" y2="250" stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- ===== BOTTOM RIGHT: US Client ===== -->
  <g filter="url(#shadow)">
    <rect x="412" y="250" width="140" height="60" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="482" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#93c5fd" letter-spacing="1">US COMPANY</text>
  <text x="482" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">Your Business</text>
  <text x="482" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#93c5fd">Capital at Risk</text>
  <!-- Arrow from Sister 2 to US Client -->
  <line x1="492" y1="176" x2="492" y2="250" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-red)" opacity="0.7"/>

  <!-- Investigation Shield Icon (center, bottom) -->
  <g transform="translate(268, 326)">
    <path d="M32,4 L60,14 L60,32 C60,48 46,58 32,64 C18,58 4,48 4,32 L4,14 Z" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="32" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#60a5fa">🔍</text>
  </g>
  <text x="300" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa" font-weight="bold">ON-GROUND DUE DILIGENCE</text>

  <!-- Pulse rings around shell entity -->
  <circle cx="300" cy="142" r="96" fill="none" stroke="#ef4444" stroke-width="0.6" opacity="0.15"/>
  <circle cx="300" cy="142" r="120" fill="none" stroke="#ef4444" stroke-width="0.4" opacity="0.08"/>
</svg>
